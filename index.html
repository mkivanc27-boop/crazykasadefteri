<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrazyClub Kasa & Veresiye</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; justify-content: center; padding: 10px; }
        .app { width: 100%; max-width: 550px; }
        
        /* Minimal Header */
        .header { text-align: center; padding: 5px 0 10px 0; }
        .logo { font-size: 1.8em; font-weight: 900; background: linear-gradient(135deg, #38bdf8, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
        .date { font-size: 0.7em; color: #94a3b8; margin-top: 2px; }

        /* Minimal Kasa Box */
        .kasa-box { background: #1e293b; border-radius: 12px; padding: 12px; text-align: center; border: 1px solid #334155; margin-bottom: 10px; }
        .kasa-label { font-size: 0.65em; letter-spacing: 2px; color: #94a3b8; font-weight: bold; text-transform: uppercase; }
        .kasa-bakiye { font-size: 2.5em; font-weight: 800; margin: 4px 0; color: #10b981; }
        .kasa-ozet { font-size: 0.75em; display: flex; justify-content: center; gap: 20px; }
        .g { color: #34d399; }
        .c { color: #f87171; }

        /* Yana Kaydırılabilir Hızlı Satış Barı */
        .hizli-bar-container { background: #1e293b; border-radius: 12px; padding: 10px; border: 1px solid #334155; margin-bottom: 10px; }
        .hizli-bar-title { font-size: 0.65em; color: #94a3b8; font-weight: bold; letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase; }
        .hizli-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .hizli-bar::-webkit-scrollbar { display: none; }
        .hizli-btn { background: #334155; border: 1px solid #475569; color: #f1f5f9; padding: 8px 12px; border-radius: 8px; font-size: 0.75em; cursor: pointer; white-space: nowrap; font-weight: 600; transition: 0.2s; }
        .hizli-btn:hover { background: #38bdf8; border-color: #38bdf8; color: #fff; }
        .hizli-btn:active { transform: scale(0.95); }

        /* Minimal Butonlar */
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .btns button { padding: 10px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: #f1f5f9; font-size: 0.8em; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btns .btn-g { background: rgba(16, 185, 129, 0.1); border-color: #10b981; color: #10b981; }
        .btns .btn-c { background: rgba(239, 68, 68, 0.1); border-color: #ef4444; color: #ef4444; }
        .btns .btn-v { background: rgba(245, 158, 11, 0.1); border-color: #f59e0b; color: #f59e0b; grid-column: span 2; }
        .btns .btn-f, .btns .btn-t { color: #94a3b8; font-size: 0.75em; }
        .btns button:active { transform: scale(0.97); }

        /* Liste Alanı */
        .islem-list { background: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow: hidden; }
        .islem-list .title { padding: 10px 12px; font-size: 0.7em; font-weight: 700; letter-spacing: 1px; color: #94a3b8; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; }
        .islem-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-bottom: 1px solid #1a2332; font-size: 0.85em; }
        .islem-item:last-child { border-bottom: none; }
        .islem-sol { display: flex; flex-direction: column; gap: 4px; }
        .islem-sol-baslik { display: flex; align-items: center; gap: 6px; font-weight: 600; }
        .islem-saat { font-size: 0.75em; color: #64748b; }
        .tutar-g { color: #10b981; font-weight: 800; }
        .tutar-c { color: #ef4444; font-weight: 800; }
        .tutar-v { color: #f59e0b; font-weight: 800; }
        .sil-btn { background: #334155; border: none; color: #f87171; cursor: pointer; border-radius: 6px; padding: 4px 8px; margin-left: 10px; font-size: 0.8em; }
        .bos { padding: 30px; text-align: center; color: #475569; font-size: 0.85em; }
        .odeme-tag { font-size: 0.7em; background: #0f172a; padding: 2px 6px; border-radius: 6px; color: #94a3b8; font-weight: normal; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); z-index: 99; justify-content: center; align-items: center; padding: 16px; backdrop-filter: blur(2px); }
        .modal.ac { display: flex; }
        .modal-box { background: #1e293b; border-radius: 16px; padding: 20px; width: 100%; max-width: 420px; border: 1px solid #334155; max-height: 85vh; overflow-y: auto; }
        .modal-box h3 { text-align: center; margin-bottom: 16px; font-size: 1.1em; }
        .modal-box label { display: block; font-size: 0.75em; font-weight: 600; color: #94a3b8; margin-bottom: 6px; }
        .modal-box input, .modal-box select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #334155; background: #0f172a; color: #fff; font-size: 0.95em; margin-bottom: 12px; transition: 0.2s; }
        .modal-box input:focus, .modal-box select:focus { outline: none; border-color: #38bdf8; }
        
        /* AUTOCOMPLETE */
        .autocomplete-container { position: relative; width: 100%; }
        .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: #0f172a; border: 1px solid #38bdf8; border-top: none; border-radius: 0 0 8px 8px; max-height: 150px; overflow-y: auto; z-index: 100; display: none; }
        .autocomplete-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #1e293b; font-size: 0.85em; color: #e2e8f0; }
        .autocomplete-item:hover { background: #38bdf8; color: #fff; font-weight: bold; }

        .odeme-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .odeme-row span { padding: 10px; text-align: center; border-radius: 8px; border: 2px solid #334155; background: #0f172a; color: #94a3b8; cursor: pointer; font-size: 0.8em; font-weight: 700; transition: 0.2s; }
        .odeme-row span.sel[data-o="nakit"] { border-color: #10b981; color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .odeme-row span.sel[data-o="pos"] { border-color: #38bdf8; color: #38bdf8; background: rgba(56, 189, 248, 0.1); }
        .odeme-row span.sel[data-o="iban"] { border-color: #a855f7; color: #a855f7; background: rgba(168, 85, 247, 0.1); }
        .odeme-row span.sel[data-o="veresiye"] { border-color: #f59e0b; color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
        
        .btn-save { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #38bdf8; color: #fff; font-weight: 800; font-size: 0.95em; cursor: pointer; margin-top: 4px; }
        .btn-close { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: transparent; color: #94a3b8; font-weight: 600; cursor: pointer; margin-top: 8px; }
        
        .veresiye-list-item { background: #0f172a; border: 1px solid #334155; border-left: 4px solid #f59e0b; padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .v-tahsil-btn { background: #10b981; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.75em; }

        /* FİŞ YAZDIRMA */
        .fis { background: #fff; color: #000; padding: 20px; border-radius: 8px; font-family: monospace; font-size: 0.85em; }
        .fis-baslik { text-align: center; font-size: 1.4em; font-weight: bold; margin-bottom: 10px; border-bottom: 2px dashed #000; padding-bottom: 10px; }
        .fis-satir { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .fis-cizgi { border-top: 1px dashed #000; margin: 10px 0; }
        .btn-print { width: 100%; padding: 12px; background: #10b981; color: #fff; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        @media print {
            body * { visibility: hidden; }
            #modR, #modR * { visibility: visible; }
            #modR { position: absolute; left: 0; top: 0; width: 100%; background: white; padding: 0; }
            .modal-box { border: none; max-width: 100%; box-shadow: none; padding: 0; }
            .btn-close, .btn-print { display: none !important; }
            .fis { width: 100%; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="app">
        <!-- HEADER -->
        <div class="header">
            <div class="logo">CrazyClub</div>
            <div class="date" id="tarihGoster"></div>
        </div>

        <!-- KASA ÖZETİ -->
        <div class="kasa-box">
            <div class="kasa-label">Nakit Kasa Bakiyesi</div>
            <div class="kasa-bakiye" id="bakiyeGoster">0,00 ₺</div>
            <div class="kasa-ozet">
                <span class="g">Giriş: <strong id="topGirdi">0,00 ₺</strong></span>
                <span class="c">Çıkış: <strong id="topCikti">0,00 ₺</strong></span>
            </div>
        </div>

        <!-- HIZLI SATIŞ BARI (YANA KAYDIRILABİLİR - 20 BUTON) -->
        <div class="hizli-bar-container">
            <div class="hizli-bar-title">⚡ Hızlı Satış (Tıkla ve Ekle)</div>
            <div class="hizli-bar">
                <button class="hizli-btn" onclick="hizliEkle('Tişört', 200)">👕 Tişört (200₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('Pantolon', 450)">👖 Pantolon (450₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('Sweatshirt', 400)">🧥 Sweat (400₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('Gömlek', 350)">👔 Gömlek (350₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('Kot Pantolon', 500)">👖 Kot (500₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('Eşofman Altı', 300)">🏃 Eşofman (300₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('Şort', 250)">🩳 Şort (250₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('Ceket', 700)">🧥 Ceket (700₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('Mont', 1200)">🧥 Mont (1200₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('Kazak', 350)">🧶 Kazak (350₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('Hırka', 400)">🧶 Hırka (400₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('Etek', 300)">👗 Etek (300₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('Elbise', 600)">👗 Elbise (600₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('İç Giyim', 100)">🩲 İç Giyim (100₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('Çorap', 50)">🧦 Çorap (50₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('Ayakkabı', 800)">👟 Ayakkabı (800₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('Çanta', 450)">👜 Çanta (450₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('Kemer', 150)">🥋 Kemer (150₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('Şapka', 150)">🧢 Şapka (150₺)</button>
                <button class="hizli-btn" onclick="hizliEkle('Gözlük', 200)">🕶️ Gözlük (200₺)</button>
            </div>
        </div>

        <!-- ANA BUTONLAR (KISAYOLLAR EKLENDİ) -->
        <div class="btns">
            <button class="btn-g" id="btnG">💰 GİRDİ (G)</button>
            <button class="btn-c" id="btnC">💸 ÇIKTI (C)</button>
            <button class="btn-v" id="btnV">📙 VERESİYE DEFTERİ (V)</button>
            <button class="btn-f" id="btnR">🧾 GÜN SONU FİŞİ (F)</button>
            <button class="btn-t" id="btnT">📅 GEÇMİŞ GÜNLER (T)</button>
        </div>

        <!-- İŞLEM LİSTESİ -->
        <div class="islem-list">
            <div class="title">
                <span>📝 BUGÜNÜN İŞLEMLERİ</span>
                <span id="islemSayisi">0 işlem</span>
            </div>
            <div id="listeKapsayici"></div>
        </div>
    </div>

    <!-- GİRDİ MODAL -->
    <div class="modal" id="modG">
        <div class="modal-box">
            <h3 style="color:#10b981;">💰 Satış Ekle</h3>
            
            <label>Ödeme Yöntemi Seçin</label>
            <div class="odeme-row" id="odemeRow">
                <span class="sel" data-o="nakit">💵 Nakit</span>
                <span data-o="pos">💳 K.Kartı</span>
                <span data-o="iban">🏦 Havale</span>
                <span data-o="veresiye">📙 Veresiye</span>
            </div>

            <div id="musteriAlani" style="display:none;">
                <label>Müşteri Adı / Soyadı (Veresiye için zorunlu)</label>
                <input type="text" id="gMusteri" placeholder="Örn: Ahmet Yılmaz" autocomplete="off">
            </div>

            <label>Ne Satıldı? (Arayın veya yazın)</label>
            <div class="autocomplete-container">
                <input type="text" id="gAciklama" placeholder="Örn: Eşofman, Tişört..." autocomplete="off">
                <div class="autocomplete-list" id="autoList"></div>
            </div>

            <label>Tutar (₺)</label>
            <input type="number" id="gTutar" placeholder="0,00" step="1" min="0">
            
            <button class="btn-save" id="gKaydetBtn">✅ SATIŞI KAYDET</button>
            <button class="btn-close" id="gKapatBtn">İptal</button>
        </div>
    </div>

    <!-- ÇIKTI MODAL -->
    <div class="modal" id="modC">
        <div class="modal-box">
            <h3 style="color:#ef4444;">💸 Kasa Çıkışı</h3>
            <label>Kategori</label>
            <select id="cKategori">
                <option>🍽️ Yemek / İçecek</option>
                <option>📦 Toptancı / Mal Alımı</option>
                <option>⚡ Fatura</option>
                <option>🏠 Kira</option>
                <option>🚗 Ulaşım / Kargo</option>
                <option>💳 Borç Ödeme</option>
                <option>🧹 Temizlik / Malzeme</option>
                <option>📝 Diğer</option>
            </select>
            <label>Detaylı Açıklama</label>
            <input type="text" id="cAciklama" placeholder="Örn: Öğle yemeği, Toptancı ödemesi..." autocomplete="off">
            <label>Tutar (₺)</label>
            <input type="number" id="cTutar" placeholder="0,00" step="1" min="0">
            <button class="btn-save" id="cKaydetBtn" style="background:#ef4444;">✅ ÇIKIŞI KAYDET</button>
            <button class="btn-close" id="cKapatBtn">İptal</button>
        </div>
    </div>

    <!-- VERESİYE DEFTERİ MODAL -->
    <div class="modal" id="modV">
        <div class="modal-box" style="max-width: 480px;">
            <h3 style="color:#f59e0b;">📙 Veresiye Defteri (Ödenmeyenler)</h3>
            <div id="veresiyeListeAlan"></div>
            <button class="btn-close" id="vKapatBtn">Kapat</button>
        </div>
    </div>

    <!-- FİŞ MODAL -->
    <div class="modal" id="modR">
        <div class="modal-box">
            <div id="fisIcerik"></div>
            <button class="btn-print" onclick="window.print()">🖨️ FİŞİ YAZDIR</button>
            <button class="btn-close" id="rKapatBtn">Kapat</button>
        </div>
    </div>

    <!-- GEÇMİŞ MODAL -->
    <div class="modal" id="modT">
        <div class="modal-box">
            <h3 style="color:#94a3b8;">📅 Geçmiş Günler</h3>
            <div id="gecmisListeAlan"></div>
            <button class="btn-close" id="tKapatBtn">Kapat</button>
        </div>
    </div>

    <script>
        // ==========================================
        // SİSTEM FONKSİYONLARI VE VERİTABANI
        // ==========================================
        const DB_KEY = 'crazyclub_kasa_db';
        const giyimUrunleri = [
            "Tişört", "Polo Yaka Tişört", "Oversize Tişört", "Sweatshirt", "Kapüşonlu Sweatshirt (Hoodie)", "Gömlek", 
            "Kazak", "Hırka", "Pantolon", "Kot Pantolon (Denim)", "Kargo Pantolon", "Eşofman Altı", "Eşofman Takımı", 
            "Şort", "Tayt", "Ceket", "Mont", "Kaban", "Yelek", "Elbise", "Etek", "İç Giyim", "Çorap", "Ayakkabı", 
            "Bot", "Şapka", "Bere", "Atkı", "Kemer", "Çanta", "Cüzdan", "Gözlük"
        ];

        function bugunTarih() { return new Date().toISOString().split('T')[0]; }
        function suAnSaat() { return new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }); }
        
        function verileriAl() { let d = localStorage.getItem(DB_KEY); return d ? JSON.parse(d) : {}; }
        function verileriKaydet(data) { localStorage.setItem(DB_KEY, JSON.stringify(data)); }
        
        function gunlukVeriAl(tarih = bugunTarih()) { let d = verileriAl(); return d[tarih] || { girdi: [], cikti: [] }; }
        function gunlukVeriKaydet(gunlukData, tarih = bugunTarih()) { let d = verileriAl(); d[tarih] = gunlukData; verileriKaydet(d); }

        function hesapla(data) {
            let nakitGirdi = 0; let nakitCikti = 0;
            data.girdi.forEach(i => { if (i.odeme === 'nakit') nakitGirdi += i.tutar; });
            data.cikti.forEach(i => { nakitCikti += i.tutar; });
            return { girdi: nakitGirdi, cikti: nakitCikti, kasa: nakitGirdi - nakitCikti };
        }

        function formatiPara(tutar) { return tutar.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ₺'; }

        function arayuzGuncelle() {
            let bugun = gunlukVeriAl();
            let hes = hesapla(bugun);

            document.getElementById('bakiyeGoster').textContent = formatiPara(hes.kasa);
            document.getElementById('topGirdi').textContent = formatiPara(hes.girdi);
            document.getElementById('topCikti').textContent = formatiPara(hes.cikti);
            
            let tOpt = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('tarihGoster').textContent = new Date().toLocaleDateString('tr-TR', tOpt);

            listeGuncelle(bugun);
        }

        function listeGuncelle(bugun) {
            let listeAlan = document.getElementById('listeKapsayici');
            let tumIslemler = [];
            bugun.girdi.forEach((i, idx) => tumIslemler.push({ tip: 'g', obj: i, id: idx }));
            bugun.cikti.forEach((i, idx) => tumIslemler.push({ tip: 'c', obj: i, id: idx }));
            tumIslemler.sort((a, b) => b.obj.saat.localeCompare(a.obj.saat));

            document.getElementById('islemSayisi').textContent = tumIslemler.length + ' İşlem';

            if (tumIslemler.length === 0) {
                listeAlan.innerHTML = '<div class="bos">Bugün henüz bir işlem yapılmadı.</div>';
                return;
            }

            let html = '';
            tumIslemler.forEach(item => {
                let i = item.obj;
                if (item.tip === 'g') {
                    let ikon = i.odeme === 'nakit' ? '💵' : i.odeme === 'pos' ? '💳' : i.odeme === 'iban' ? '🏦' : '📙';
                    let tagRenk = i.odeme === 'veresiye' ? 'color:#f59e0b' : '';
                    let tagMetin = i.odeme.toUpperCase();
                    let tutarClass = i.odeme === 'veresiye' ? 'tutar-v' : 'tutar-g';
                    let aciklama = i.odeme === 'veresiye' ? `<b>${i.musteri}</b> - ${i.aciklama}` : i.aciklama;

                    html += `
                    <div class="islem-item">
                        <div class="islem-sol">
                            <div class="islem-sol-baslik">${ikon} ${aciklama}</div>
                            <div style="display:flex; gap:8px;">
                                <span class="odeme-tag" style="${tagRenk}">${tagMetin}</span>
                                <span class="islem-saat">${i.saat}</span
                                        function islemSil(tip, id) {
            if(!confirm('Bu işlemi silmek istediğinize emin misiniz?')) return;
            let bugun = gunlukVeriAl();
            if (tip === 'g') bugun.girdi.splice(id, 1);
            else bugun.cikti.splice(id, 1);
            gunlukVeriKaydet(bugun);
            arayuzGuncelle();
        }

        // ==========================================
        // KLAVYE KISAYOLLARI VE HIZLI EKLE
        // ==========================================
        document.addEventListener('keydown', function(event) {
            if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA' || event.target.tagName === 'SELECT') {
                if (event.key === 'Escape') document.querySelectorAll('.modal').forEach(m => m.classList.remove('ac'));
                return; 
            }

            if (event.key.toLowerCase() === 'g') document.getElementById('btnG').click();
            if (event.key.toLowerCase() === 'c') document.getElementById('btnC').click();
            if (event.key.toLowerCase() === 'v') document.getElementById('btnV').click();
            if (event.key.toLowerCase() === 'f') document.getElementById('btnR').click();
            if (event.key.toLowerCase() === 't') document.getElementById('btnT').click();
            if (event.key === 'Escape') document.querySelectorAll('.modal').forEach(m => m.classList.remove('ac'));
        });

        function hizliEkle(urun, fiyat) {
            document.getElementById('gAciklama').value = urun;
            document.getElementById('gTutar').value = fiyat;
            document.getElementById('gMusteri').value = '';
            
            document.querySelectorAll('#odemeRow span').forEach(s => s.classList.remove('sel'));
            document.querySelector('#odemeRow span[data-o="nakit"]').classList.add('sel');
            seciliOdeme = 'nakit';
            document.getElementById('musteriAlani').style.display = 'none';

            document.getElementById('modG').classList.add('ac');
        }

        // ==========================================
        // MODAL KONTROLLERİ
        // ==========================================
        const modG = document.getElementById('modG');
        const modC = document.getElementById('modC');
        const modV = document.getElementById('modV');
        const modR = document.getElementById('modR');
        const modT = document.getElementById('modT');

        document.getElementById('btnG').onclick = () => {
            document.getElementById('gTutar').value = ''; document.getElementById('gAciklama').value = ''; document.getElementById('gMusteri').value = '';
            modG.classList.add('ac');
        };
        document.getElementById('gKapatBtn').onclick = () => modG.classList.remove('ac');

        document.getElementById('btnC').onclick = () => {
            document.getElementById('cTutar').value = ''; document.getElementById('cAciklama').value = '';
            modC.classList.add('ac');
        };
        document.getElementById('cKapatBtn').onclick = () => modC.classList.remove('ac');

        document.getElementById('vKapatBtn').onclick = () => modV.classList.remove('ac');
        document.getElementById('rKapatBtn').onclick = () => modR.classList.remove('ac');
        document.getElementById('tKapatBtn').onclick = () => modT.classList.remove('ac');

        let seciliOdeme = 'nakit';
        document.querySelectorAll('#odemeRow span').forEach(el => {
            el.onclick = function() {
                document.querySelectorAll('#odemeRow span').forEach(s => s.classList.remove('sel'));
                this.classList.add('sel');
                seciliOdeme = this.dataset.o;
                document.getElementById('musteriAlani').style.display = seciliOdeme === 'veresiye' ? 'block' : 'none';
            }
        });

        // ==========================================
        // KAYIT VE İŞLEM MANTIĞI
        // ==========================================
        document.getElementById('gKaydetBtn').onclick = () => {
            let aciklama = document.getElementById('gAciklama').value.trim();
            let tutar = parseFloat(document.getElementById('gTutar').value);
            let musteri = document.getElementById('gMusteri').value.trim();

            if (!aciklama || isNaN(tutar) || tutar <= 0) return alert('Lütfen geçerli bir ürün adı ve tutar girin.');
            if (seciliOdeme === 'veresiye' && !musteri) return alert('Veresiye satışlarda Müşteri Adı zorunludur!');

            let bugun = gunlukVeriAl();
            bugun.girdi.push({
                saat: suAnSaat(),
                aciklama: aciklama,
                tutar: tutar,
                odeme: seciliOdeme,
                musteri: seciliOdeme === 'veresiye' ? musteri : '',
                odendi: seciliOdeme === 'veresiye' ? false : true
            });

            gunlukVeriKaydet(bugun);
            modG.classList.remove('ac');
            arayuzGuncelle();
        };

        document.getElementById('cKaydetBtn').onclick = () => {
            let kategori = document.getElementById('cKategori').value;
            let aciklama = document.getElementById('cAciklama').value.trim();
            let tutar = parseFloat(document.getElementById('cTutar').value);

            if (isNaN(tutar) || tutar <= 0) return alert('Lütfen geçerli bir tutar girin.');

            let bugun = gunlukVeriAl();
            bugun.cikti.push({ saat: suAnSaat(), kategori: kategori, aciklama: aciklama ? aciklama : kategori, tutar: tutar });

            gunlukVeriKaydet(bugun);
            modC.classList.remove('ac');
            arayuzGuncelle();
        };

        // Veresiye ve Fiş fonksiyonlarını buraya ekleyerek sistemi tamamlayabiliriz
        function veresiyeListele() {
            let data = verileriAl(); let html = ''; let toplamAlacak = 0;
            for (let tarih in data) {
                data[tarih].girdi.forEach((islem, index) => {
                    if (islem.odeme === 'veresiye' && !islem.odendi) {
                        toplamAlacak += islem.tutar;
                        html += `<div class="veresiye-list-item"><div>👤 ${islem.musteri} | 👕 ${islem.aciklama}</div><div>${formatiPara(islem.tutar)}</div></div>`;
                    }
                });
            }
            document.getElementById('veresiyeListeAlan').innerHTML = html || 'Ödenmemiş veresiye yok.';
        }
        document.getElementById('btnV').onclick = () => { veresiyeListele(); modV.classList.add('ac'); };

        arayuzGuncelle();
    </script>
</body>
</html>
