<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrazyClubs - Kasa Defteri</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f172a;
            color: #f1f5f9;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 10px;
        }
        .app {
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            padding: 10px 0 6px;
        }
        .logo {
            font-size: 1.5em;
            font-weight: 900;
            background: linear-gradient(135deg, #f97316, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .date {
            font-size: 0.7em;
            color: #94a3b8;
        }

        .kasa-box {
            background: #1e293b;
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            border: 1px solid #334155;
            margin-bottom: 8px;
        }
        .kasa-label {
            font-size: 0.65em;
            letter-spacing: 2px;
            color: #94a3b8;
        }
        .kasa-bakiye {
            font-size: 2.6em;
            font-weight: 800;
            margin: 4px 0;
        }
        .kasa-ozet {
            font-size: 0.72em;
            display: flex;
            justify-content: center;
            gap: 14px;
        }
        .g {
            color: #10b981;
        }
        .c {
            color: #ef4444;
        }

        .btns {
            display: flex;
            gap: 5px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .btns button {
            flex: 1;
            min-width: 60px;
            padding: 8px 6px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #94a3b8;
            font-size: 0.7em;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            font-family: inherit;
        }
        .btns .btn-g {
            border-color: #10b981;
            color: #10b981;
        }
        .btns .btn-c {
            border-color: #ef4444;
            color: #ef4444;
        }
        .btns button:active {
            opacity: 0.7;
        }

        .islem-list {
            background: #1e293b;
            border-radius: 14px;
            border: 1px solid #334155;
            overflow: hidden;
        }
        .islem-list .title {
            padding: 10px 14px;
            font-size: 0.72em;
            font-weight: 700;
            letter-spacing: 1px;
            color: #94a3b8;
            border-bottom: 1px solid #334155;
        }
        .islem-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid #1a2332;
            font-size: 0.78em;
        }
        .islem-item:last-child {
            border-bottom: none;
        }
        .islem-sol {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .islem-saat {
            font-size: 0.75em;
            color: #64748b;
        }
        .tutar-g {
            color: #10b981;
            font-weight: 700;
        }
        .tutar-c {
            color: #ef4444;
            font-weight: 700;
        }
        .sil-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.9em;
            padding: 2px 6px;
            opacity: 0.6;
        }
        .sil-btn:hover {
            opacity: 1;
        }
        .bos {
            padding: 30px;
            text-align: center;
            color: #475569;
            font-size: 0.8em;
        }
        .odeme-tag {
            font-size: 0.65em;
            background: #0f172a;
            padding: 2px 7px;
            border-radius: 10px;
            color: #94a3b8;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 99;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .modal.ac {
            display: flex;
        }
        .modal-box {
            background: #1e293b;
            border-radius: 18px;
            padding: 20px 16px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #334155;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-box h3 {
            text-align: center;
            margin-bottom: 14px;
            font-size: 1em;
        }
        .modal-box label {
            display: block;
            font-size: 0.68em;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 3px;
            letter-spacing: 1px;
        }
        .modal-box input,
        .modal-box select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #334155;
            background: #0f172a;
            color: #fff;
            font-size: 0.95em;
            margin-bottom: 10px;
            font-family: inherit;
        }
        .modal-box input:focus,
        .modal-box select:focus {
            outline: none;
            border-color: #f97316;
        }
        .odeme-row {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }
        .odeme-row span {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 10px;
            border: 2px solid #334155;
            background: #0f172a;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: 700;
        }
        .odeme-row span.sel {
            border-color: #10b981;
            color: #10b981;
            background: rgba(16, 185, 129, 0.08);
        }
        .btn-save {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #f97316;
            color: #fff;
            font-weight: 700;
            font-size: 0.95em;
            cursor: pointer;
            margin-top: 4px;
            font-family: inherit;
        }
        .btn-close {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: transparent;
            color: #94a3b8;
            font-weight: 600;
            cursor: pointer;
            margin-top: 6px;
            font-family: inherit;
            font-size: 0.85em;
        }

        /* FİŞ */
        .fis {
            background: #fffef7;
            color: #111;
            padding: 16px 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.78em;
            line-height: 1.6;
        }
        .fis .fh {
            text-align: center;
            font-weight: bold;
            font-size: 1em;
        }
        .fis .fl {
            border-top: 1px dashed #888;
            margin: 8px 0;
        }
    </style>
</head>
<body>

    <div class="app">
        <div class="header">
            <div class="logo">🃏 CrazyClubs</div>
            <div class="date" id="tarih"></div>
        </div>

        <div class="kasa-box">
            <div class="kasa-label">🏧 Kasadaki Nakit</div>
            <div class="kasa-bakiye" id="bakiye">0,00 ₺</div>
            <div class="kasa-ozet">
                <span class="g">🟢 <strong id="tg">0,00</strong></span>
                <span class="c">🔴 <strong id="tc">0,00</strong></span>
            </div>
        </div>

        <div class="btns">
            <button class="btn-g" id="btnG">💰 GİRDİ (G)</button>
            <button class="btn-c" id="btnC">💸 ÇIKTI (X)</button>
            <button id="btnR">📋 FİŞ (R)</button>
            <button id="btnT">📅 GEÇMİŞ</button>
        </div>

        <div class="islem-list">
            <div class="title">📝 BUGÜNÜN İŞLEMLERİ <span style="font-size:0.7em;color:#64748b;" id="is">0 işlem</span></div>
            <div id="liste"></div>
        </div>
    </div>

    <!-- GİRDİ MODAL -->
    <div class="modal" id="modG">
        <div class="modal-box">
            <h3 style="color:#10b981;">💰 Para Girişi</h3>
            <label>Ne sattın?</label>
            <input type="text" id="gAcik" placeholder="Oyuncak, Çay...">
            <label>Tutar</label>
            <input type="number" id="gTutar" placeholder="0" step="0.01" min="0">
            <label>Ödeme</label>
            <div class="odeme-row" id="odemeRow">
                <span class="sel" data-o="nakit">💵 Nakit</span>
                <span data-o="pos">💳 POS</span>
                <span data-o="iban">🏦 IBAN</span>
            </div>
            <button class="btn-save" id="gKaydet">✅ KAYDET</button>
            <button class="btn-close" id="gKapat">İptal</button>
        </div>
    </div>

    <!-- ÇIKTI MODAL -->
    <div class="modal" id="modC">
        <div class="modal-box">
            <h3 style="color:#ef4444;">💸 Para Çıkışı</h3>
            <label>Kategori</label>
            <select id="cKat">
                <option>🍽️ Yemek</option>
                <option>⚡ Fatura</option>
                <option>📦 Malzeme</option>
                <option>🏠 Kira</option>
                <option>🚗 Ulaşım</option>
                <option>💰 Borç Ödeme</option>
                <option>📝 Diğer</option>
            </select>
            <label>Açıklama</label>
            <input type="text" id="cAcik" placeholder="Elektrik, Yemek...">
            <label>Tutar</label>
            <input type="number" id="cTutar" placeholder="0" step="0.01" min="0">
            <button class="btn-save" id="cKaydet" style="background:#ef4444;">✅ KAYDET</button>
            <button class="btn-close" id="cKapat">İptal</button>
        </div>
    </div>

    <!-- FİŞ MODAL -->
    <div class="modal" id="modR">
        <div class="modal-box" id="fisIcerik"></div>
    </div>

    <!-- GEÇMİŞ MODAL -->
    <div class="modal" id="modT">
        <div class="modal-box">
            <h3 style="color:#a5b4fc;">📅 Geçmiş</h3>
            <div id="tarihListe"></div>
            <button class="btn-close" id="tKapat">Kapat</button>
        </div>
    </div>

    <script>
        // ============ BASİT VE ÇALIŞAN KOD ============
        var KEY = 'cc_kasa';

        function b() { return new Date().toISOString().split('T')[0]; }

        function s() { return new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }); }

        function al() { var d = localStorage.getItem(KEY); return d ? JSON.parse(d) : {}; }

        function kaydet(o) { localStorage.setItem(KEY, JSON.stringify(o)); }

        function bugunAl() { var d = al(); return d[b()] || { g: [], c: [] }; }

        function bugunKaydet(i) { var d = al();
            d[b()] = i;
            kaydet(d); }

        function nakit(i) {
            var n = 0;
            i.g.forEach(function(x) { if (x.o === 'nakit') n += x.t; });
            i.c.forEach(function(x) { n -= x.t; });
            return Math.max(0, n);
        }

        function tg(i) { return i.g.reduce(function(s, x) { return s + x.t; }, 0); }

        function tc(i) { return i.c.reduce(function(s, x) { return s + x.t; }, 0); }

        function tum(i) {
            var t = [];
            i.g.forEach(function(x) { t.push({ tip: 'g', d: x }); });
            i.c.forEach(function(x) { t.push({ tip: 'c', d: x }); });
            t.sort(function(a, b) { return b.d.s.localeCompare(a.d.s); });
            return t;
        }

        function guncelle() {
            var i = bugunAl();
            document.getElementById('bakiye').textContent = nakit(i).toFixed(2).replace('.', ',') + ' ₺';
            document.getElementById('tg').textContent = tg(i).toFixed(2).replace('.', ',') + ' ₺';
            document.getElementById('tc').textContent = tc(i).toFixed(2).replace('.', ',') + ' ₺';
            document.getElementById('tarih').textContent = new Date().toLocaleDateString('tr-TR', { weekday: 'long',
                year: 'numeric', month: 'long', day: 'numeric' });
            listeGuncelle(i);
        }

        function listeGuncelle(i) {
            var t = tum(i);
            var el = document.getElementById('liste');
            document.getElementById('is').textContent = t.length + ' işlem';
            if (t.length === 0) {
                el.innerHTML = '<div class="bos">Henüz işlem yok<br><small>G veya X tuşu ile başla</small></div>';
                return;
            }
            var h = '';
            t.forEach(function(x, idx) {
                if (x.tip === 'g') {
                    var oe = x.d.o === 'nakit' ? '💵' : x.d.o === 'pos' ? '💳' : '🏦';
                    var ot = x.d.o === 'nakit' ? 'Nakit' : x.d.o === 'pos' ? 'POS' : 'IBAN';
                    h += '<div class="islem-item">';
                    h += '<div class="islem-sol">' + oe + ' <span>' + x.d.a +
                        '</span> <span class="odeme-tag">' + ot + '</span></div>';
                    h += '<div style="display:flex;align-items:center;gap:6px;">';
                    h += '<span class="tutar-g">+' + x.d.t.toFixed(2) + ' ₺</span>';
                    h += '<span class="islem-saat">' + x.d.s + '</span>';
                    h +=
                        '<button class="sil-btn" onclick="sil(\'g\',' + idx +
                        ')" title="Sil">🗑️</button></div></div>';
                } else {
                    h += '<div class="islem-item">';
                    h += '<div class="islem-sol">💸 <span>' + x.d.a + '</span> <span class="odeme-tag">' + x.d
                        .k + '</span></div>';
                    h += '<div style="display:flex;align-items:center;gap:6px;">';
                    h += '<span class="tutar-c">-' + x.d.t.toFixed(2) + ' ₺</span>';
                    h += '<span class="islem-saat">' + x.d.s + '</span>';
                    h += '<button class="sil-btn" onclick="sil(\'c\',' + idx +
                        ')" title="Sil">🗑️</button></div></div>';
                }
            });
            el.innerHTML = h;
        }

        function sil(tip, listIdx) {
            if (!confirm('Bu işlemi silmek istediğine emin misin?')) return;
            var i = bugunAl();
            var t = tum(i);
            var hedef = t[listIdx];
            if (hedef.tip === 'g') {
                var oi = i.g.findIndex(function(x) { return x.a === hedef.d.a && x.t === hedef.d.t && x.o ===
                        hedef.d.o && x.s === hedef.d.s; });
                if (oi > -1) i.g.splice(oi, 1);
            } else {
                var oi = i.c.findIndex(function(x) { return x.a === hedef.d.a && x.t === hedef.d.t && x.k ===
                        hedef.d.k && x.s === hedef.d.s; });
                if (oi > -1) i.c.splice(oi, 1);
            }
            bugunKaydet(i);
            guncelle();
        }

        // Modal aç/kapat
        function ac(id) { document.getElementById(id).classList.add('ac'); }

        function kapat(id) { document.getElementById(id).classList.remove('ac'); }

        // ============ BUTONLAR ============
        document.getElementById('btnG').onclick = function() {
            document.getElementById('gTutar').value = '';
            document.getElementById('gAcik').value = '';
            document.querySelectorAll('#odemeRow span').forEach(function(s) { s.classList.remove('sel'); });
            document.querySelector('#odemeRow span[data-o="nakit"]').classList.add('sel');
            ac('modG');
            setTimeout(function() { document.getElementById('gTutar').focus(); }, 150);
        };

        document.querySelectorAll('#odemeRow span').forEach(function(s) {
            s.onclick = function() {
                document.querySelectorAll('#odemeRow span').forEach(function(x) { x.classList.remove(
                        'sel'); });
                this.classList.add('sel');
            };
        });

        document.getElementById('gKaydet').onclick = function() {
            var a = document.getElementById('gAcik').value || 'Satış';
            var t = parseFloat(document.getElementById('gTutar').value);
            var o = document.querySelector('#odemeRow span.sel').getAttribute('data-o');
            if (!t || t <= 0) { alert('Geçerli tutar gir!'); return; }
            var i = bugunAl();
            i.g.push({ a: a, t: t, o: o, s: s() });
            bugunKaydet(i);
            kapat('modG');
            guncelle();
        };
        document.getElementById('gKapat').onclick = function() { kapat('modG'); };

        document.getElementById('btnC').onclick = function() {
            document.getElementById('cTutar').value = '';
            document.getElementById('cAcik').value = '';
            document.getElementById('cKat').value = '🍽️ Yemek';
            ac('modC');
            setTimeout(function() { document.getElementById('cTutar').focus(); }, 150);
        };
        document.getElementById('cKaydet').onclick = function() {
            var k = document.getElementById('cKat').value;
            var a = document.getElementById('cAcik').value || k;
            var t = parseFloat(document.getElementById('cTutar').value);
            if (!t || t <= 0) { alert('Geçerli tutar gir!'); return; }
            var i = bugunAl();
            i.c.push({ k: k, a: a, t: t, s: s() });
            bugunKaydet(i);
            kapat('modC');
            guncelle();
        };
        document.getElementById('cKapat').onclick = function() { kapat('modC'); };

        // FİŞ
        document.getElementById('btnR').onclick = function() {
            var i = bugunAl();
            var n = nakit(i);
            var pos = 0,
                iban = 0;
            i.g.forEach(function(x) { if (x.o === 'pos') pos += x.t; if (x.o === 'iban') iban += x.t; });
            var h = '<div class="fis"><div class="fh">🃏 CrazyClubs</div>';
            h += '<div style="text-align:center;font-size:0.8em;">' + new Date().toLocaleDateString('tr-TR', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            }) + '</div><div class="fl"></div>';
            h += '<b>📥 Girdiler:</b><br>';
            if (i.g.length === 0) h += '<span style="color:#999">Yok</span><br>';
            else i.g.forEach(function(x) { h += '  ' + (x.o === 'nakit' ? '💵' : x.o === 'pos' ? '💳' : '🏦') + ' ' + x
                    .a + ': +' + x.t.toFixed(2) + ' ₺<br>'; });
            h += '<div class="fl"></div><b>📤 Çıktılar:</b><br>';
            if (i.c.length === 0) h += '<span style="color:#999">Yok</span><br>';
            else i.c.forEach(function(x) { h += '  ' + x.k + ' ' + x.a + ': -' + x.t.toFixed(2) + ' ₺<br>'; });
            h += '<div class="fl"></div>';
            h += '💰 Girdi: ' + tg(i).toFixed(2) + ' ₺<br>';
            h += '💸 Çıktı: ' + tc(i).toFixed(2) + ' ₺<br>';
            h += '<b style="font-size:1.1em;color:#065f46;">🏧 Kasa: ' + n.toFixed(2) + ' ₺</b><br>';
            if (pos > 0 || iban > 0) {
                h += '<div class="fl"></div><span style="color:#991b1b;">📌 Kasada Yok:</span><br>';
                if (pos > 0) h += '  💳 POS: ' + pos.toFixed(2) + ' ₺<br>';
                if (iban > 0) h += '  🏦 IBAN: ' + iban.toFixed(2) + ' ₺<br>';
            }
            h +=
                '<div class="fl"
